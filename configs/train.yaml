experiment:
  exp_name: fno_baseline

paths:
  savepath_train: /kaggle/temp/data/train/
  savepath_val: /kaggle/temp/data/val/
  min_max_file: /kaggle/input/competitions/aisehack-theme-2/stats/feat_min_max.mat
  save_dir: /kaggle/working/experiments/baseline/logs/log.json
  model_save_path: /kaggle/working/experiments/baseline/checkpoints/fno_baseline.pt

data:
  ntrain: 2112
  ntest: 528
  total_time: 26
  time_input: 10
  time_out: 16
  S1: 140
  S2: 124
  stride: 1

features:
  V: 20
  met_variables:
    ["cpm25", "q2", "t2", "u10", "v10", "swdown", "pblh", "psfc", "rain"]
  emission_variables:
    ["PM25", "NH3", "SO2", "NOx", "NMVOC_e", "NMVOC_finn", "bio"]
  derived_variables: ["wind_speed", "vent_coef", "rain_mask"]

model:
  modes: 8
  width: 192

training:
  batch_size: 6
  epochs: 60
  lr: 1e-3
  weight_decay: 1e-5
  scheduler_step: 60
  scheduler_gamma: 0.5
  checkpoint_every: 10
  save_checkpoint: True # Set to True to save the .pt file
  early_stopping: True # Set to True to enable early stopping
