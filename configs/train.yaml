experiment:
  exp_name: fno_baseline

paths:
  savepath_train: data/train/
  savepath_val: data/val/
  save_dir: log.json
  model_save_path: fno_baseline.pt
  stats_path: grid_robust_stats.npy
  topo_path: topo_proxy.npy

data:
  time_input: 10
  time_out: 16
  S1: 140
  S2: 124
  total_time: 26
  stride: 4

features:
  V: 18 # 1 PM2.5 + 7 met + 7 emi + 3 derived
  met_variables: ["cpm25", "q2", "t2", "u10", "v10", "swdown", "pblh", "rain"] # psfc removed
  emission_variables:
    ["PM25", "NH3", "SO2", "NOx", "NMVOC_e", "NMVOC_finn", "bio"]
  derived_variables: ["wind_speed", "vent_coef", "rain_mask"]

model:
  modes: 8
  width: 256

training:
  batch_size: 16
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-5
  checkpoint_every: 10
  save_checkpoint: True
  early_stopping: False
