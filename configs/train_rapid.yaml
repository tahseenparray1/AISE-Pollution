experiment:
  exp_name: fno_rapid

paths:
  savepath_train: /kaggle/temp/data/train_rapid/
  savepath_val: /kaggle/temp/data/val_rapid/
  save_dir: /kaggle/working/log_rapid.json
  model_save_path: /kaggle/working/fno_rapid.pt
  stats_path: /kaggle/working/grid_robust_stats.npy
  topo_path: /kaggle/working/topo_proxy.npy

data:
  time_input: 10
  time_out: 16
  S1: 140
  S2: 124
  total_time: 26
  stride: 24

features:
  V: 17
  met_variables: ["cpm25", "t2", "u10", "v10", "swdown", "pblh", "rain"]
  emission_variables:
    ["PM25", "NH3", "SO2", "NOx", "NMVOC_e", "NMVOC_finn", "bio"]
  derived_variables: ["wind_speed", "vent_coef", "rain_mask"]

model:
  width: 256

training:
  batch_size: 16
  epochs: 50
  lr: 1e-3
  weight_decay: 1e-5
  checkpoint_every: 10
  save_checkpoint: True
  early_stopping: False
