paths:
  raw_path:       /kaggle/input/competitions/aisehack-theme-2/raw/
  train_savepath: /kaggle/temp/data/train/
  val_savepath:   /kaggle/temp/data/val/
  topo_path:      /kaggle/working/topo_proxy.npy
  stats_path:     /kaggle/working/grid_robust_stats.npy

data:
  months: ["APRIL_16", "JULY_16", "OCT_16", "DEC_16"]
  horizon: 26
  stride:  3   # Warning 1 fix: stride=2 risks ~152GB disk; stride=3 gives ~101GB, still ~33% more samples
  val_frac: 0.2
  seed:    0

features:
  # FIX Critical #2: q2 (specific humidity) was missing here but present in train.yaml.
  # FastInMemoryDataset builds its feature index from train.yaml's met_variables list,
  # so if q2 is not saved into train_data.npy it either reads the wrong column or
  # the index arithmetic silently shifts every subsequent feature by one position.
  met_variables_raw:
    ["cpm25", "q2", "t2", "u10", "v10", "swdown", "pblh", "rain"]
  emission_variables_raw:
    ["PM25", "NH3", "SO2", "NOx", "NMVOC_e", "NMVOC_finn", "bio"]